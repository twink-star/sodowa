<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SW2.5 成長ツール</title>

<style>

body{
    font-family:sans-serif;
    background:#f0f2f5;
    margin:0;
    padding:12px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    border-radius:12px;
    padding:12px;
    margin-bottom:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.top-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.top-row .card{
    flex:1;
    min-width:250px;
}

button{
    padding:8px 14px;
    margin:4px;
    font-size:14px;
    cursor:pointer;
}

input[type="number"]{
    width:60px;
    font-size:14px;
}

table{
    width:100%;
    border-collapse:collapse;
    text-align:center;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
}

.dice-area{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.dice-box{
    flex:1;
    background:#fafafa;
    border-radius:10px;
    padding:10px;
    text-align:center;
}

.dice-name{
    font-size:24px;
    min-height:32px;
    margin-bottom:10px;
}

.output{
    font-size:18px;
    word-break:break-all;
    margin-top:10px;
}

@media(max-width:600px){

    .dice-area{
        flex-direction:column;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="top-row">

        <div class="card">

            <h3>成長回数</h3>

            <input type="number"
                   id="growthCountInput"
                   min="0"
                   value="0">

            <button onclick="setGrowthCount()">
                設定
            </button>

            <p>
                残り：
                <span id="growthCount">0</span>
            </p>

        </div>

        <div class="card">

            <h3>勇者の証</h3>

            <label>
                <input type="radio"
                       name="proof"
                       value=""
                       checked>
                使用しない
            </label>

            <label>
                <input type="radio"
                       name="proof"
                       value="技">
                技
            </label>

            <label>
                <input type="radio"
                       name="proof"
                       value="体">
                体
            </label>

            <label>
                <input type="radio"
                       name="proof"
                       value="心">
                心
            </label>

        </div>

    </div>

    <div class="card">

        <button onclick="rollDice()">
            サイコロを振る
        </button>

        <button onclick="useProof()">
            勇者の証を使用
        </button>

        <button onclick="resetAll()">
            リセット
        </button>

        <div class="dice-area">

            <div class="dice-box">

                <div id="leftName"
                     class="dice-name">
                    -
                </div>

                <button onclick="chooseLeft()">
                    左を選ぶ
                </button>

            </div>

            <div class="dice-box">

                <div id="rightName"
                     class="dice-name">
                    -
                </div>

                <button onclick="chooseRight()">
                    右を選ぶ
                </button>

            </div>

        </div>

    </div>

    <div class="card">

        <h3>能力値</h3>

        <table>

            <tr>
                <th>能力</th>
                <th>初期</th>
                <th>成長</th>
                <th>合計</th>
                <th>ボーナス</th>
            </tr>

            <tbody id="statusTable"></tbody>

        </table>

    </div>

    <div class="card">

        <button onclick="exportResult()">
            成長結果を出力
        </button>

        <div id="output" class="output"></div>

    </div>

</div>

<script>

const names = [
    "器用",
    "敏捷",
    "筋力",
    "生命",
    "知力",
    "精神"
];

const state = {

    rolled:false,
    proofUsed:false,

    leftDice:null,
    rightDice:null,

    growthCount:0,

    base:[0,0,0,0,0,0],

    growth:[0,0,0,0,0,0]

};

function setGrowthCount(){

    state.growthCount =
        Number(
            document.getElementById(
                "growthCountInput"
            ).value
        );

    render();

}

function rollDice(){

    if(state.growthCount <= 0){

        alert("成長回数がありません！");
        return;

    }

    if(state.rolled){

        alert("すでに振っています！");
        return;

    }

    state.leftDice =
        Math.floor(Math.random()*6);

    state.rightDice =
        Math.floor(Math.random()*6);

    state.rolled = true;
    state.proofUsed = false;

    renderDice();

}

function renderDice(){

    if(state.leftDice !== null){

        document.getElementById(
            "leftName"
        ).textContent =
            names[state.leftDice];

    }else{

        document.getElementById(
            "leftName"
        ).textContent = "-";

    }

    if(state.rightDice !== null){

        document.getElementById(
            "rightName"
        ).textContent =
            names[state.rightDice];

    }else{

        document.getElementById(
            "rightName"
        ).textContent = "-";

    }

}

function useProof(){

    if(!state.rolled){

        alert("先にサイコロを振ってください！");
        return;

    }

    if(state.proofUsed){

        alert("すでに使用しています！");
        return;

    }

    const proof =
        document.querySelector(
            'input[name="proof"]:checked'
        );

    if(proof.value === ""){

        alert("勇者の証を選択してください！");
        return;

    }

    const d1 = state.leftDice + 1;
    const d2 = state.rightDice + 1;

    const type = proof.value;

    if(type === "技"){

        if(d1 <= 2 || d2 <= 2){

            alert("技の勇者の証は使用できません！");
            return;

        }

    }

    if(type === "体"){

        if(
            d1 === 3 || d1 === 4 ||
            d2 === 3 || d2 === 4
        ){

            alert("体の勇者の証は使用できません！");
            return;

        }

    }

    if(type === "心"){

        if(d1 >= 5 || d2 >= 5){

            alert("心の勇者の証は使用できません！");
            return;

        }

    }

    state.leftDice =
        Math.floor(Math.random()*6);

    state.rightDice = null;

    state.proofUsed = true;

    renderDice();

}

function chooseLeft(){

    if(!state.rolled){

        alert("先にサイコロを振ってください！");
        return;

    }

    growthProcess(state.leftDice);

}

function chooseRight(){

    if(!state.rolled){

        alert("先にサイコロを振ってください！");
        return;

    }

    if(state.rightDice === null){

        alert("現在は左のみ選択可能です！");
        return;

    }

    growthProcess(state.rightDice);

}

function growthProcess(d){

    state.growth[d]++;

    state.growthCount--;

    state.leftDice = null;
    state.rightDice = null;

    state.rolled = false;
    state.proofUsed = false;

    render();

}

function render(){

    document.getElementById(
        "growthCount"
    ).textContent =
        state.growthCount;

    renderDice();

    const tbody =
        document.getElementById(
            "statusTable"
        );

    tbody.innerHTML = "";

    for(let i=0;i<6;i++){

        const baseInput =
            `<input type="number"
                    min="0"
                    value="${state.base[i]}"
                    onchange="changeBase(${i}, this.value)">`;

        const total =
            state.base[i] +
            state.growth[i];

        const bonus =
            Math.floor(total / 6);

        tbody.innerHTML += `
            <tr>
                <td>${names[i]}</td>
                <td>${baseInput}</td>
                <td>${state.growth[i]}</td>
                <td>${total}</td>
                <td>${bonus}</td>
            </tr>
        `;

    }

}

function changeBase(index, value){

    state.base[index] =
        Number(value);

    render();

}

function exportResult(){

    let result = "";

    for(let i=0;i<6;i++){

        if(state.growth[i] > 0){

            result +=
                names[i] +
                "×" +
                state.growth[i];

        }

    }

    if(result === ""){

        alert("成長結果がありません！");
        return;

    }

    document.getElementById(
        "output"
    ).textContent = result;

}

function resetAll(){

    state.rolled = false;
    state.proofUsed = false;

    state.leftDice = null;
    state.rightDice = null;

    state.growthCount = 0;

    state.base =
        [0,0,0,0,0,0];

    state.growth =
        [0,0,0,0,0,0];

    document.getElementById(
        "growthCountInput"
    ).value = 0;

    document.getElementById(
        "output"
    ).textContent = "";

    const checked =
        document.querySelector(
            'input[name="proof"]:checked'
        );

    if(checked){

        checked.checked = false;

    }

    document.querySelector(
        'input[name="proof"][value=""]'
    ).checked = true;

    render();

    alert("リセット完了！");

}

render();

</script>

</body>
</html>
