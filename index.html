<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SW2.5 成長ツール</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>SW2.5 成長ツール</h1>

    <p>成長回数: <span id="count">5</span></p>

    <div class="dice-area">
        <div>
            <p id="leftName">-</p>
            <button onclick="chooseLeft()">左を選ぶ</button>
        </div>

        <div>
            <p id="rightName">-</p>
            <button onclick="chooseRight()">右を選ぶ</button>
        </div>
    </div>

    <button onclick="rollDice()">サイコロを振る</button>

    <h2>成長結果</h2>

    <ul>
        <li>器用: <span id="g0">0</span></li>
        <li>敏捷: <span id="g1">0</span></li>
        <li>筋力: <span id="g2">0</span></li>
        <li>生命: <span id="g3">0</span></li>
        <li>知力: <span id="g4">0</span></li>
        <li>精神: <span id="g5">0</span></li>
    </ul>

    <script src="script.js"></script>

</body>
</html>
